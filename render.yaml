services:
  # Web Service
  - type: web
    name: dr-bartender-onboarding
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "26.5.0"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PUBLIC_SITE_URL
        sync: false
      # File Storage (Cloudflare R2)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      # Email (Resend)
      - key: RESEND_API_KEY
        sync: false
      # SMS (Twilio)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # Payments (Stripe — live)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_DEPOSIT_AMOUNT
        value: "10000"
      # Payments (Stripe — test mode; used only while STRIPE_TEST_MODE_UNTIL is in the future)
      - key: STRIPE_SECRET_KEY_TEST
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY_TEST
        sync: false
      - key: STRIPE_WEBHOOK_SECRET_TEST
        sync: false
      - key: STRIPE_TEST_MODE_UNTIL
        sync: false
      # Admin Seed
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Thumbtack Integration (shared secret for Basic Auth / x-thumbtack-secret header)
      - key: THUMBTACK_WEBHOOK_SECRET
        sync: false
      # Zul VA Calling (Telegram-triggered Twilio callback bridge).
      # Set the secret/allowlist/number values in the Render dashboard — never here.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_ALLOWED_USER_ID
        sync: false
      - key: VOICE_CALLER_ID
        sync: false
      - key: VA_CELL
        sync: false
      - key: RUN_VA_CALLING_SCHEDULER
        sync: false
      - key: VA_CALL_DAILY_CAP
        value: "40"
      - key: VA_CALL_PER_MIN_CAP
        value: "5"
      - key: VA_CALL_TIME_LIMIT_SEC
        value: "1800"
      - key: PENDING_CALL_TTL_SEC
        value: "120"
      - key: LEAD_CALL_ENABLED
        sync: false
      - key: LEAD_CALL_DAILY_CAP
        value: "25"
