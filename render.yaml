services:
  # Web Service
  - type: web
    name: dr-bartender-onboarding
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      # File Storage (Cloudflare R2)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      # Email (Resend)
      - key: RESEND_API_KEY
        sync: false
      # SMS (Twilio)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # Payments (Stripe — live)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_DEPOSIT_AMOUNT
        value: "10000"
      # Payments (Stripe — test mode; used only while STRIPE_TEST_MODE_UNTIL is in the future)
      - key: STRIPE_SECRET_KEY_TEST
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY_TEST
        sync: false
      - key: STRIPE_WEBHOOK_SECRET_TEST
        sync: false
      - key: STRIPE_TEST_MODE_UNTIL
        sync: false
      # Admin Seed
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Thumbtack Integration (shared secret for Basic Auth / x-thumbtack-secret header)
      - key: THUMBTACK_WEBHOOK_SECRET
        sync: false
