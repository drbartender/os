services:
  # Web Service
  - type: web
    name: dr-bartender-onboarding
    env: node
    buildCommand: npm install && cd client && npm install && cd .. && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        value: https://dr-bartender-onboarding.onrender.com
