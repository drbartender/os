<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2C1F0E" />
    <meta name="description" content="Dr. Bartender" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <title>Dr. Bartender</title>
    <!-- Staff-host pre-paint skin: sets data-app/data-skin on <html> BEFORE any
         CSS applies, so the staff portal never flashes the chalkboard backdrop
         or resolves --sp-* vars to transparent (they are defined per data-skin).
         Reads the sp-skin localStorage mirror written by StaffShell; the value
         is whitelisted to the two literals, and the whole script is inert on
         every non-staff host. First-ever visit on a device falls back to
         prefers-color-scheme (nothing mirrored yet). -->
    <script>
      (function () {
        try {
          if (location.hostname.indexOf('staff.') !== 0) return;
          var d = document.documentElement;
          d.setAttribute('data-app', 'staff');
          var s = null;
          try { s = localStorage.getItem('sp-skin'); } catch (e) {}
          if (s !== 'dark' && s !== 'light') {
            s = (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
          }
          d.setAttribute('data-skin', s);
        } catch (e) {}
      })();
    </script>
    <!-- Preconnect for the admin-OS font load (Inter / JetBrains / Libre Caslon) -->
    <!-- that AdminLayout injects on mount. Public pages use local IM Fell English -->
    <!-- (no Google Fonts request) so the preconnect's only cost there is a DNS+TLS -->
    <!-- warm-up never used — accepted to keep admin/staff first paint fast. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
