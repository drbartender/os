      Residual as found in the guard-fix adversarial review, PRE-EXISTING and out of that lane's
      scope: payment_type 'drink_plan_with_balance' intents charge the outstanding balance but were
      invisible to the guard's payment_type==='balance' check, so an autopay-enrolled client paying
      their balance through the drink-plan flow during a webhook outage could still be double-charged
