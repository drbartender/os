    footprint: [server/index.js, render.yaml]
    action: >
      /api/health runs SELECT 1 with a short statement timeout, 503 on failure; add healthCheckPath to
      render.yaml. Capture server from app.listen; SIGTERM -> stop interval timers, server.close() drain,
      pool.end(), hard timeout. Add one fail-fast required-env block (DATABASE_URL + transactional
      provider keys); keep warn-only for optional integrations.

