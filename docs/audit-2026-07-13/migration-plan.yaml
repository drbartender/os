# Migration plan — 2026-07-13 whole-codebase audit
# Companion docs: system-map.md (subsystem map) + tech-debt-register.md (findings, evidence, rejected fixes).
# NO code has been written. Each lane below is proposed; Dallas greenlights lanes (or phases) explicitly.
# Lane mechanics follow CLAUDE.md: think-on-main, build-in-lanes, squash merge; `sensitive: true` lanes
# get the full review fleet + /second-opinion at push per the review model, regardless of size.

meta:
  title: os refactor / debt burn-down
  date: 2026-07-13
  repo: /home/drbartender/projects/os
  head_sha: 46e969b
  audit_method: 55-agent workflow (12 mappers, 3 reconcilers, 11 hunters, adversarial verification)
  guiding_principles:
    - Payment flow judged HARDENED 2026-07-11; recommended AGAINST rewrite. Nothing here rewrites it.
    - Minimal-first; never gold-plate battle-tested money code (see register section 5, rejected fixes).
    - Behavior-inert consolidation before structural splits; splits only where files are both big AND hot.
    - Every schema change idempotent (IF NOT EXISTS / guarded DO-block), per schema.sql convention.
    - Additive test lanes are always safe and can interleave anywhere.

phases:
  - id: P0
    name: Resilience + hygiene quick wins
    intent: Small, verified-safe fixes closing real failure modes (process crash, pool deadlock instance, dead health check, unclamped params). All S effort; can run as parallel lanes.
  - id: P1
    name: Known correctness mediums
    intent: The carried medium/high items from prior audits, each surgical, each money/auth-adjacent (full fleet).
  - id: P2
    name: Safety net
    intent: Test coverage on guarded paths + the CI/test-isolation project (the one confirmed-medium structural gap).
  - id: P3
    name: Consolidation (drift-killers)
    intent: Single-source the hand-copied constants/maps/helpers that have already drifted or demonstrably will.
  - id: P4
    name: Structural splits
    intent: File-size ratchet relief on hot files, using the codebase's own established split patterns.
  - id: P5
    name: Deferred / triggered projects
    intent: Own design sessions or explicit triggers; listed so they are not lost. Not scheduled.

