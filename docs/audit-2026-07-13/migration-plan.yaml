    footprint: [server/routes/thumbtack.js]
    action: >
      Mirror the 2026-07-13 capture-lead fix: release dbClient (released-flag guard, NOT a bare early
      release; the finally at :454 would double-release and pg throws) before runPostCommitSteps at
      :441 and the heal path at :387.
    verify: existing thumbtack tests + manual webhook replay

  - id: qw-process-net
