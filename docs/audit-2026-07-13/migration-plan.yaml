    severity: low
    effort: S
    sensitive: false
    footprint: [server/routes/shifts.js, server/routes/contractor.js, server/routes/admin/users.js, server/index.js]
    action: >
      Add `return` before the inner pool.query in the four geocode .then() callbacks so rejections reach
      the existing .catch; add process.on('unhandledRejection'/'uncaughtException') in index.js that
      Sentry-captures and logs instead of letting Node kill the web process + all 13 schedulers.

  - id: qw-health-shutdown
